# ------------------------------------------------
# USB (Dongle outputs USB keyboard to the computer)
# ------------------------------------------------
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_BOOT=y

# Dongle should never sleep
CONFIG_ZMK_SLEEP=n

# ------------------------------------------------
# BLE
# ------------------------------------------------
CONFIG_ZMK_BLE=y

# Dongle acts as BLE central
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Number of peripherals (left + right halves)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Allow USB + 2 halves
CONFIG_BT_MAX_CONN=3

# Stronger signal from dongle
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Faster BLE reconnect
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# ------------------------------------------------
# Display (OLED)
# ------------------------------------------------
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN=y

# Display widgets
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_BLE_STATUS=y

# Fetch battery from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y